name: Codex Harness Check

on:
  push:
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python harness/scripts/validate_scope.py --scope scope.example.yaml
      - run: python harness/scripts/run_evals.py
