      - subfinder
      - dnsx
      - httpx
      - katana
      - gau
      - waybackurls
    optional:
      - amass
      - bbot
      - uncover
      - alterx
      - tlsx
      - waymore
      - paramspider
      - kiterunner
      - gitleaks
      - trufflehog
      - arjun
      - gf
      - qsreplace
      - kxss
      - naabu
      - nuclei
