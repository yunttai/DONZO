profiles:
  fast:
    required:
      - subfinder
      - dnsx
      - httpx
      - katana
    optional:
      - nuclei
  normal:
    required:
      - subfinder
      - dnsx
      - httpx
      - katana
      - gau
      - waybackurls
    optional:
      - naabu
      - nuclei
  deep:
