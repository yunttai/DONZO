program_name: example-bounty
profile: fast
mode: authorized-only

in_scope:
  domains:
    - example.com
    - "*.example.com"
  urls:
    - https://app.example.com
  ip_ranges: []

out_of_scope:
  domains:
    - payments.example.com
    - admin-prod.example.com
  urls: []
  paths:
    - /logout
    - /delete
    - /checkout
    - /payment
  test_types:
    - dos
    - ddos
    - stress_test
    - bruteforce
    - brute_force
    - credential_stuffing
    - password_spraying
    - social_engineering
    - phishing
    - malware_upload
    - destructive_test
    - data_modification
    - payment_abuse
    - session_hijacking
    - account_takeover_automation
    - automatic_exploit
    - automatic_submission
    - mass_exploitation
    - automatic_secret_validation
    - automatic_subdomain_takeover_claim
    - aggressive_scanning
    - intrusive_scanning
    - content_fuzzing
    - directory_bruteforce
    - parameter_fuzzing
    - object_id_enumeration
    - auth_bypass_automation
    - privilege_escalation_automation
    - account_takeover
    - credential_reuse
    - token_replay
    - cookie_replay
    - secret_validation
    - data_exfiltration
    - pii_access
    - sensitive_file_read
    - database_dump
    - oast_callback
    - ssrf_callback_testing
    - blind_xss_callback
    - stored_xss_payloading
    - sql_injection_payloading
    - command_injection_payloading
    - file_upload_exploit
    - race_condition_stress
    - graphql_batching_dos
    - email_bombing
    - sms_bombing
    - notification_spam
    - dependency_confusion
    - third_party_target_testing

scan_policy:
  passive_recon: true
  active_recon: true
  port_scan: false
  crawling: true
  archive_collection: true
  content_discovery: false
  parameter_mining: true
  nuclei_scan: false
  zap_baseline: false
  dalfox_candidate: false
  oast: false
  active_exploit: false
  automatic_submission: false

rate_limit:
  max_requests_per_second: 3
  max_concurrency: 5
  timeout_seconds: 10

authenticated_crawl:
  enabled: false
  header_env: DONZO_AUTH_HEADER
  cookie_env: DONZO_AUTH_COOKIE
  allowed_domains: []
  pass_to_tools: true
  pass_to_probes: true

verification:
  enabled: true
  fail_closed: true
  network_probe: true
  probe:
    max_requests_per_candidate: 2
    # 0 means unlimited verification probes; rate_limit still controls pacing.
    max_network_probes: 24
    # 0 disables same-origin timeout caching.
    origin_timeout_threshold: 2
    allowed_methods:
      - HEAD
      - GET
      - OPTIONS
    allow_post: false
    follow_redirects: true
    max_redirects: 2
    timeout_seconds: 10
    max_body_bytes: 200000
    redact_sensitive_data: true
  soft404:
    enabled: true
    baseline_per_host: true
    random_probe_count: 1
    similarity_threshold: 0.92
    content_length_tolerance_ratio: 0.10
  api_docs:
    enabled: true
    verify_schema_url: true
    max_schema_fetches: 2
    require_fingerprint: true
    sensitive_path_keywords:
      - user
      - account
      - order
      - invoice
      - document
      - file
      - admin
      - payment
  sourcemap:
    enabled: true
    require_json_parse: true
    store_full_map: false
    store_sources_content: false
    max_map_bytes: 1000000
  graphql:
    enabled: true
    safe_query_test: false
    introspection_test: false
    require_graphql_fingerprint: true
  bola_filter:
    enabled: true
    filter_auth_endpoints: true
    require_resource_keyword: true
    require_object_id: true
  redirect_filter:
    enabled: true
    filter_login_redirects: true
    filter_home_redirects: true
    keep_for_open_redirect_candidates: true
  cluster:
    enabled: true
    triage_unit: cluster
    min_verified_candidates_for_cluster: 1
    exclude_common_error_clusters: true

llm:
  required: true
  fail_closed: true
  primary_provider: codex_cli
  secondary_provider: openai
  drivers:
    codex_cli:
      enabled: true
      command: codex
      model: gpt-5.5
      model_reasoning_effort: xhigh
      temperature: 0.0
      json_schema_required: true
      timeout_seconds: 180
      max_attempts: 2
      output_dir: artifacts/llm
      sandbox: read-only
      ignore_user_config: true
      ignore_rules: true
      strict_config: true
      json_events: true
    openai:
      enabled: false
      model: gpt-5.5
      temperature: 0.0
      json_schema_required: true
    anthropic:
      enabled: false
      model: claude-sonnet
      temperature: 0.0
      json_schema_required: true
  stages:
    policy_parser: true
    asset_prioritizer: true
    endpoint_interpreter: true
    candidate_generator: true
    finding_triage: true
    advocate: true
    critic: true
    judge: true
    risk_ranker: true
    report_writer: true
  failure_policy:
    on_api_error: mark_llm_failed
    on_schema_error: retry_then_mark_schema_invalid
    on_rate_limit: queue_for_batch
    on_timeout: retry_with_backoff
    fallback_to_rules: false
  privacy:
    redact_secrets: true
    redact_cookies: true
    redact_auth_headers: true
    max_response_excerpt_chars: 4000
    store_prompt_and_response: true
  safety:
    no_auto_exploit: true
    no_auto_submission: true
    no_secret_validation: true
    no_takeover_claim: true
    require_manual_verification: true
